server:
  port: 9092

logging:
  level:
    com.izylife.ssi.paymentgateway: INFO

ssi:
  issuer:
    base-url: http://localhost:9090
    authorization-path: /oauth2/authorize
    token-path: /oauth2/token
    client-id: payment-gateway
    client-secret: change-me
    redirect-uri: http://localhost:9092/oidc/callback
    scope: openid profile credential_preview
  payment-gateway:
    public-base-url: http://localhost:9092
    default-return-url: http://localhost:9092/demo/result.html

sandbox:
  stripe:
    base-url: https://api.stripe.com
    secret-key: sk_test_change_me
    payment-method-id: pm_card_visa
    auto-confirm: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
